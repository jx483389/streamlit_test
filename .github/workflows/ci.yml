name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11.14'

      - name: 라이브러리 설치
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: 테스트 실행
        run: pytest